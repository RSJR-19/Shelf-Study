<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelf Study</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <div class="shelf">
        <div class="shelf-title" id="shelfTitle">
            <div class="shelf-title-text-container">
                <h1 class="shelf-title-text" id="shelfTitleText">Untitled</h1>
            </div>
            
            <input type="text" id="shelfTitleInput" maxlength="20">
            <button class="shelf-menu-btn" id="shelfMenuBtn"></button>
        </div>
        <div class="inner-shelf" id="innerShelf">
            
    
        </div>
        
    </div>

        <div class="shelf-menu" id="shelfMenu">
            <div class="inner-shelf-menu">
                <div class="main-inner-shelf">
                    <div class="inner-list" id="innerList">
                        
                        <div class="catalog-item">
                            <div class="catalog-content" id="addShelfContentBtn">
                                <p>Add New Shelf</p>
                            </div>
                        </div>
                    </div>
                    
                </div>
                <div class="details-inner-shelf" ></div>
            </div>
            <div class="menu-handle" id="menuHandle"></div>
        </div>

        <div id="addBookScreen">
            <div id="buttonInputBar">
                <button id="addBookExitBtn">X</button>
                <input type="text" id="bookTitleInput" placeholder="Type Book Title..." maxlength="30">
                <div class="color-input" onclick="changeColor(1)"></div>
                <div class="color-input" style="background-color: lightgreen;" onclick="changeColor(2)"></div>
                <div class="color-input" style="background-color: lightblue;" onclick="changeColor(3)"></div>
            </div>
            <div id="bookCover">
                <p id="bookCoverText">Title</p>
                <div class="add-button-bar">
                    <button id="saveBookBtn">Save</button>
                </div>
                
            </div>
        </div>

    <script src="js/app.js"></script>
    <script src="js/test.js"></script>

</body>
</html>
